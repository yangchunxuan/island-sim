# 世界区域定义
#
# 4×4 网格宏观区域，每个区域包含 5×5 tiles。
# 区域属性影响资源生成、NPC行为倾向和生态压力计算。
# 坐标范围：grid_x 0-3, grid_y 0-3 → 对应 tile 坐标 (grid_x*5 到 grid_x*5+4)

regions:
  - id: nw_forest
    name: "西北森林"
    grid_x: 0
    grid_y: 0
    biome: forest
    resource_bias:
      wood: 0.9        # 木材资源丰富度 0.0-1.0
      mushroom: 0.6
      fish: 0.2
    danger_level: 0.3
    fertility: 0.8
    humidity: 0.6
    traffic_score: 0.0  # 运行时更新

  - id: n_ridge
    name: "北脊"
    grid_x: 1
    grid_y: 0
    biome: highland
    resource_bias:
      wood: 0.4
      mushroom: 0.3
      fish: 0.1
    danger_level: 0.5
    fertility: 0.3
    humidity: 0.4
    traffic_score: 0.0

